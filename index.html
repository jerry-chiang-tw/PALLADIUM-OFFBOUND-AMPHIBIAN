<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PALLADIUM OFFBOUND AMPHIBIAN WP+</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="app-container">
        <header class="header">
            <h1>OFFBOUND AMPHIBIAN WP+</h1>
            <p>機能防水 × 輕量舒適 × 都市戶外必備</p>
        </header>

        <div class="stage-wrapper">
            <div class="shoe-stage" id="shoeStage">
                <img src="images/shoe-main.png" alt="Palladium Shoe" class="shoe-img" id="shoeImg">
                
                <button class="hotspot" style="top: 38%; left: 45%;" data-feature="waterproof"></button>
                <button class="hotspot" style="top: 58%; left: 35%;" data-feature="midsole"></button>
                <button class="hotspot" style="top: 62%; left: 25%;" data-feature="outsole"></button>
                <button class="hotspot" style="top: 50%; left: 60%;" data-feature="material"></button>
                <button class="hotspot" style="top: 32%; left: 52%;" data-feature="lacelock"></button>
                <button class="hotspot" style="top: 35%; left: 75%;" data-feature="heel-tape"></button>
            </div>
        </div>

        <div class="hint">💡 點擊鞋身光點查看科技細節</div>

        <div class="bottom-sheet" id="bottomSheet">
            <div class="sheet-handle"></div>
            <button class="close-btn" id="closeBtn">&times;</button>
            <div class="sheet-content">
                <img src="" alt="Feature Detail" class="feature-detail-img" id="featureImg">
                <h2 id="featureTitle">功能名稱</h2>
                <p id="featureDesc">功能詳細描述內容...</p>
            </div>
        </div>
        
        <div class="overlay" id="overlay"></div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
